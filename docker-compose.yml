services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_password
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: "postgresql://ecommerce_user:ecommerce_password@postgres:5432/ecommerce_db?schema=public"
      JWT_SECRET: "change-this-development-secret-before-deploying"
      JWT_EXPIRES_IN: "1d"
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
